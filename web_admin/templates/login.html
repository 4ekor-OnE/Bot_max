{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block body %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Панель управления</h1>
        <p class="text-muted small">Тот же пароль, что для команды <code>/admin</code> в боте.</p>
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <div class="mb-3">
            <label class="form-label">Пароль администратора</label>
            <input type="password" name="password" class="form-control" required autofocus autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary w-100">Войти</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
