{% extends "base.html" %}
{% block title %}Категории{% endblock %}
{% block body %}
<h1 class="h3 mb-4">Категории</h1>
<div class="card shadow-sm mb-4">
  <div class="card-body">
    <h2 class="h6">Новая категория</h2>
    <form method="post" action="{{ url_for('category_add') }}" class="row g-2">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="col-md-4"><input type="text" name="name" class="form-control" placeholder="Название" required></div>
      <div class="col-md-4"><input type="text" name="description" class="form-control" placeholder="Описание (или -)"></div>
      <div class="col-md-2"><input type="number" name="sla_hours" class="form-control" placeholder="SLA ч" value="24" min="1"></div>
      <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Создать</button></div>
    </form>
  </div>
</div>
<div class="table-responsive card shadow-sm">
  <table class="table mb-0 align-middle">
    <thead class="table-light"><tr><th>ID</th><th>Редактирование</th><th>Заявок</th><th></th></tr></thead>
    <tbody>
      {% for c in categories %}
      <tr>
        <td>{{ c.id }}</td>
        <td>
          <form method="post" action="{{ url_for('category_update', cid=c.id) }}" class="row g-2">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="col-md-4"><input type="text" name="name" value="{{ c.name }}" class="form-control form-control-sm" required></div>
            <div class="col-md-4"><input type="text" name="description" value="{{ c.description or '' }}" class="form-control form-control-sm"></div>
            <div class="col-md-2"><input type="number" name="sla_hours" value="{{ c.sla_hours }}" class="form-control form-control-sm" min="1"></div>
            <div class="col-md-2"><button type="submit" class="btn btn-sm btn-outline-secondary">Сохранить</button></div>
          </form>
        </td>
        <td>{{ c.ticket_count }}</td>
        <td>
          {% if c.ticket_count == 0 %}
          <form method="post" action="{{ url_for('category_delete', cid=c.id) }}" onsubmit="return confirm('Удалить категорию?');">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="btn btn-sm btn-outline-danger">Удалить</button>
          </form>
          {% else %}
          <span class="text-muted small">—</span>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
