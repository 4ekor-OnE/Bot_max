<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Главная{% endblock %} · Панель управления</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .navbar-brand { font-weight: 600; }
    main { max-width: 1200px; }
  </style>
</head>
<body>
  {% if session.get('web_admin') %}
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid" style="max-width:1200px;margin:0 auto;">
      <a class="navbar-brand" href="{{ url_for('dashboard') }}">Панель управления</a>
      <div class="navbar-nav flex-row gap-2 flex-wrap">
        <a class="nav-link text-white" href="{{ url_for('dashboard') }}">Сводка</a>
        <a class="nav-link text-white" href="{{ url_for('users_list') }}">Пользователи</a>
        <a class="nav-link text-white" href="{{ url_for('shops_list') }}">Магазины</a>
        <a class="nav-link text-white" href="{{ url_for('categories_list') }}">Категории</a>
        <a class="nav-link text-white" href="{{ url_for('tickets_list') }}">Заявки</a>
        <a class="nav-link text-warning" href="{{ url_for('logout') }}">Выход</a>
      </div>
    </div>
  </nav>
  {% endif %}
  <main class="container pb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}
    {% block body %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
